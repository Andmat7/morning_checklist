<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Matutino</title>
  <style>
    :root {
      --agua:           #2196f3;
      --sueno:          #9c27b0;
      --ejercicio:      #43a047;
      --dieta:          #f57c00;
      --bg:             #1a1a2e;
      --card-bg:        #16213e;
      --text:           #e0e0e0;
      --text-muted:     #aaaaaa;
      --title-color:    #e0e0e0;
      --border:         #2a2a4a;
      --hover-bg:       #1e1e3a;
      --progress-track: #2a2a4a;
      --progress-text:  #888888;
      --btn-bg:         #16213e;
      --btn-color:      #cccccc;
      --btn-border:     #3a3a5a;
      --input-bg:       #1a1a35;
      --input-border:   #3a3a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0.4rem 0.5rem 1.5rem;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .reset-btn {
      flex-shrink: 0;
      padding: 0.45rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--btn-bg);
      color: var(--btn-color);
      border: 2px solid var(--btn-border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .reset-btn:hover {
      background: var(--title-color);
      color: var(--bg);
      border-color: var(--title-color);
    }

    .header-info {
      flex: 1;
      text-align: center;
    }

    .top-bar-spacer {
      flex-shrink: 0;
      width: 6.5rem;
    }

    h1 {
      font-size: 1.15rem;
      color: var(--title-color);
      line-height: 1.2;
    }

    .fecha {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    .timer-total {
      font-size: 0.82rem;
      color: #4fc3f7;
      font-variant-numeric: tabular-nums;
      margin-top: 0.1rem;
    }

    /* ── Grid ── */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0.8rem;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .card-header .left {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .card-header .icon { font-size: 1rem; }

    .card-timer {
      font-size: 0.72rem;
      opacity: 0.9;
      font-variant-numeric: tabular-nums;
      background: rgba(0,0,0,0.2);
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
    }

    .card.agua      .card-header { background: var(--agua); }
    .card.sueno     .card-header { background: var(--sueno); }
    .card.ejercicio .card-header { background: var(--ejercicio); }
    .card.dieta     .card-header { background: var(--dieta); }

    .card-body { padding: 0.35rem 0.75rem 0.55rem; }

    .progress-bar-wrapper {
      height: 4px;
      background: var(--progress-track);
      border-radius: 3px;
      margin: 0.25rem 0 0.15rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 0.35s ease;
    }

    .card.agua      .progress-bar { background: var(--agua); }
    .card.sueno     .progress-bar { background: var(--sueno); }
    .card.ejercicio .progress-bar { background: var(--ejercicio); }
    .card.dieta     .progress-bar { background: var(--dieta); }

    .progress-text {
      font-size: 0.68rem;
      color: var(--progress-text);
      text-align: right;
      margin-bottom: 0.15rem;
    }

    /* ── Items — label left, checkbox right (right-thumb friendly) ── */
    .item {
      display: flex;
      align-items: center;
      padding: 0.42rem 0.25rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      border-radius: 6px;
    }

    .item:last-child { border-bottom: none; }
    .item:hover, .item:active { background: var(--hover-bg); }

    .item input[type="checkbox"] {
      order: 2;
      width: 1.45rem;
      height: 1.45rem;
      flex-shrink: 0;
      margin-left: 0.6rem;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .item span {
      order: 1;
      flex: 1;
      font-size: 0.88rem;
    }

    .card.agua      .item { --accent: var(--agua); }
    .card.sueno     .item { --accent: var(--sueno); }
    .card.ejercicio .item { --accent: var(--ejercicio); }
    .card.dieta     .item { --accent: var(--dieta); }

    .item input:checked + span {
      text-decoration: line-through;
      color: #888;
    }

    /* ── Meal sub-sections ── */
    .meal-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.35rem 0 0.1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.1rem;
    }

    /* ── Nutrient input rows ── */
    .nutrient-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.38rem 0.25rem;
      border-bottom: 1px solid var(--border);
    }

    .nutrient-label {
      font-size: 0.86rem;
      flex: 1;
    }

    .nutrient-right {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .nutrient-input {
      width: 7.5rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.86rem;
      padding: 0.22rem 0.4rem;
      text-align: left;
    }

    .nutrient-input:focus {
      outline: none;
      border-color: var(--dieta);
    }

    .nutrient-unit {
      font-size: 0.72rem;
      color: var(--text-muted);
      min-width: 1rem;
    }

    /* ── Completed card ── */
    .card-complete-mark {
      display: none;
      font-size: 1.1rem;
      margin-right: 0.3rem;
    }
    .card.completed .card-complete-mark { display: inline; }
    .card.completed .card-body { display: none; }

    /* ── Not-started: collapse body without checkmark ── */
    .card.not-started .card-body { display: none; }

    /* ── Button state colours ── */
    .reset-btn.state-iniciar { border-color: #43a047; color: #43a047; }
    .reset-btn.state-limpiar { border-color: #e53935; color: #e53935; }

    @media (max-width: 360px) {
      h1 { font-size: 1rem; }
      .item span { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-spacer"></div>
    <div class="header-info">
      <h1>☀️ Checklist Matutino</h1>
      <div class="fecha" id="fecha"></div>
      <div class="timer-total">⏱ <span id="timerTotal">00:00</span></div>
    </div>
    <button class="reset-btn state-iniciar" id="resetBtn">▶️ Iniciar</button>
  </div>

  <div class="grid" id="grid"></div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script>
    const CONFIG_URL = 'checklist.yaml';
    const grid = document.getElementById('grid');
    let SECTIONS = [];

    async function loadChecklistConfig() {
      const response = await fetch(CONFIG_URL, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`No se pudo cargar ${CONFIG_URL}`);
      }
      const yamlText = await response.text();
      const parsed = jsyaml.load(yamlText);
      if (!parsed || !Array.isArray(parsed.sections)) {
        throw new Error('Formato YAML invalido: se esperaba sections[]');
      }
      return parsed.sections;
    }

    function createCheckboxItem(item, sectionKey) {
      const label = document.createElement('label');
      label.className = 'item';

      const input = document.createElement('input');
      input.type = 'checkbox';
      input.id = item.id;
      input.dataset.section = sectionKey;

      const text = document.createElement('span');
      text.textContent = item.text || '';

      label.appendChild(input);
      label.appendChild(text);
      return label;
    }

    function createMealTitle(item) {
      const mealTitle = document.createElement('div');
      mealTitle.className = 'meal-title';
      mealTitle.textContent = item.text || '';
      return mealTitle;
    }

    function createNutrientRow(item) {
      const row = document.createElement('div');
      row.className = 'nutrient-row';

      const label = document.createElement('span');
      label.className = 'nutrient-label';
      label.textContent = item.label || '';

      const right = document.createElement('div');
      right.className = 'nutrient-right';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'nutrient-input';
      input.id = item.id;
      input.placeholder = item.placeholder || '';
      input.setAttribute('aria-label', item.aria_label || item.label || 'Nutriente');

      right.appendChild(input);
      row.appendChild(label);
      row.appendChild(right);
      return row;
    }

    function createCard(section) {
      const card = document.createElement('div');
      card.className = `card ${section.key}`;

      const header = document.createElement('div');
      header.className = 'card-header';

      const left = document.createElement('div');
      left.className = 'left';

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = section.icon || '';

      left.appendChild(icon);
      left.appendChild(document.createTextNode(section.title || section.key));

      const doneMark = document.createElement('span');
      doneMark.className = 'card-complete-mark';
      doneMark.textContent = '✅';

      const timer = document.createElement('span');
      timer.className = 'card-timer';
      timer.id = `timer-${section.key}`;
      timer.textContent = '--:--';

      header.appendChild(left);
      header.appendChild(doneMark);
      header.appendChild(timer);

      const body = document.createElement('div');
      body.className = 'card-body';

      const progressWrapper = document.createElement('div');
      progressWrapper.className = 'progress-bar-wrapper';

      const progressBar = document.createElement('div');
      progressBar.className = 'progress-bar';
      progressBar.id = `pb-${section.key}`;

      progressWrapper.appendChild(progressBar);

      const progressText = document.createElement('div');
      progressText.className = 'progress-text';
      progressText.id = `pt-${section.key}`;
      progressText.textContent = '0 / 0';

      body.appendChild(progressWrapper);
      body.appendChild(progressText);

      (section.items || []).forEach(item => {
        const type = item.type || 'checkbox';
        if (type === 'meal-title') {
          body.appendChild(createMealTitle(item));
        } else if (type === 'nutrient') {
          body.appendChild(createNutrientRow(item));
        } else {
          body.appendChild(createCheckboxItem(item, section.key));
        }
      });

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    function renderChecklist(sections) {
      grid.innerHTML = '';
      SECTIONS = sections.map(sec => sec.key);
      sections.forEach(section => {
        grid.appendChild(createCard(section));
      });
    }

    function renderConfigError(error) {
      grid.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'card';
      const body = document.createElement('div');
      body.className = 'card-body';
      body.style.display = 'block';
      body.style.padding = '1rem';
      body.textContent = 'No se pudo cargar checklist.yaml. Abre la pagina con un servidor local para permitir fetch de archivos.';
      card.appendChild(body);
      grid.appendChild(card);
      console.error(error);
    }

    // ── Date ─────────────────────────────────────────────────────────────────
    const hoy = new Date();
    document.getElementById('fecha').textContent = hoy.toLocaleDateString('es-MX', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    // ── Global timer state ────────────────────────────────────────────────────
    let timerElapsed  = 0;    // ms accumulated before last pause
    let timerLastStart = null; // Date.now() when last resumed (null = paused)
    let isStarted     = false;

    function getElapsed() {
      return timerLastStart !== null
        ? timerElapsed + (Date.now() - timerLastStart)
        : timerElapsed;
    }

    function startGlobalTimer() {
      if (timerLastStart === null) timerLastStart = Date.now();
    }

    function pauseGlobalTimer() {
      if (timerLastStart !== null) {
        timerElapsed += Date.now() - timerLastStart;
        timerLastStart = null;
      }
    }

    function resetGlobalTimer() {
      timerLastStart = null;
      timerElapsed   = 0;
      document.getElementById('timerTotal').textContent = '00:00';
    }

    function formatTime(ms) {
      const s   = Math.floor(ms / 1000);
      const h   = Math.floor(s / 3600);
      const m   = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      const pad = n => String(n).padStart(2, '0');
      return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
    }

    setInterval(() => {
      if (timerLastStart !== null) {
        document.getElementById('timerTotal').textContent = formatTime(getElapsed());
      }
    }, 1000);

    // ── Section timers ────────────────────────────────────────────────────────
    const sectionStartTime = {};
    const sectionEndTime   = {};

    function tickSectionTimers() {
      SECTIONS.forEach(sec => {
        if (sectionStartTime[sec] && !sectionEndTime[sec]) {
          document.getElementById(`timer-${sec}`).textContent =
            formatTime(Date.now() - sectionStartTime[sec]);
        }
      });
    }

    setInterval(tickSectionTimers, 1000);

    // ── Storage ───────────────────────────────────────────────────────────────
    const STORAGE_KEY  = 'morning_checklist_state';
    const NUTRIENT_KEY = 'morning_checklist_nutrients';
    const SESSION_KEY  = 'morning_checklist_session';

    function getCheckboxes()    { return document.querySelectorAll('input[type="checkbox"]'); }
    function getNutrientInputs(){ return document.querySelectorAll('.nutrient-input'); }

    function saveState() {
      const state = {};
      getCheckboxes().forEach(cb => { state[cb.id] = cb.checked; });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

      const nutrients = {};
      getNutrientInputs().forEach(inp => { nutrients[inp.id] = inp.value; });
      localStorage.setItem(NUTRIENT_KEY, JSON.stringify(nutrients));
    }

    function saveSession() {
      if (isStarted) {
        localStorage.setItem(SESSION_KEY, JSON.stringify({ elapsed: getElapsed() }));
      } else {
        localStorage.removeItem(SESSION_KEY);
      }
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const state = JSON.parse(raw);
        getCheckboxes().forEach(cb => {
          if (state[cb.id] !== undefined) cb.checked = state[cb.id];
        });
      }
      const rawN = localStorage.getItem(NUTRIENT_KEY);
      if (rawN) {
        const nutrients = JSON.parse(rawN);
        getNutrientInputs().forEach(inp => {
          if (nutrients[inp.id] !== undefined) inp.value = nutrients[inp.id];
        });
      }
    }

    // ── All-done detection ────────────────────────────────────────────────────
    function areAllDone() {
      return SECTIONS.every(sec => {
        const boxes = document.querySelectorAll(`input[data-section="${sec}"]`);
        return boxes.length > 0 && Array.from(boxes).every(b => b.checked);
      });
    }

    function checkAllDone() {
      if (!isStarted) return;
      if (areAllDone()) {
        pauseGlobalTimer();
      } else {
        startGlobalTimer();
      }
    }

    // ── Button state ──────────────────────────────────────────────────────────
    const resetBtn = document.getElementById('resetBtn');

    function setButtonState(state) {
      if (state === 'iniciar') {
        resetBtn.textContent = '▶️ Iniciar';
        resetBtn.classList.remove('state-limpiar');
        resetBtn.classList.add('state-iniciar');
      } else {
        resetBtn.textContent = '🗑️ Limpiar';
        resetBtn.classList.remove('state-iniciar');
        resetBtn.classList.add('state-limpiar');
      }
    }

    // ── Progress ──────────────────────────────────────────────────────────────
    function updateProgress(section) {
      const boxes = document.querySelectorAll(`input[data-section="${section}"]`);
      const total = boxes.length;
      const done  = Array.from(boxes).filter(b => b.checked).length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById(`pb-${section}`).style.width = pct + '%';
      document.getElementById(`pt-${section}`).textContent = `${done} / ${total}`;

      const card = document.querySelector(`.card.${section}`);
      if (done === total && total > 0) {
        card.classList.add('completed');
      } else {
        card.classList.remove('completed');
      }

      if (done > 0 && !sectionStartTime[section]) {
        sectionStartTime[section] = Date.now();
      }
      if (done === total && total > 0 && !sectionEndTime[section]) {
        sectionEndTime[section] = Date.now();
        document.getElementById(`timer-${section}`).textContent =
          formatTime(sectionEndTime[section] - sectionStartTime[section]);
      } else if (done < total) {
        delete sectionEndTime[section];
        if (done === 0) {
          delete sectionStartTime[section];
          document.getElementById(`timer-${section}`).textContent = '--:--';
        }
      }
    }

    function updateAll() {
      SECTIONS.forEach(updateProgress);
      checkAllDone();
    }

    // ── Events ────────────────────────────────────────────────────────────────
    function bindInputEvents() {
      getCheckboxes().forEach(cb => {
        cb.addEventListener('change', () => {
          updateProgress(cb.dataset.section);
          checkAllDone();
          saveState();
          saveSession();
        });
      });

      getNutrientInputs().forEach(inp => {
        inp.addEventListener('input', saveState);
      });
    }

    resetBtn.addEventListener('click', () => {
      if (!isStarted) {
        // ── Iniciar: start session ──
        isStarted = true;
        SECTIONS.forEach(sec => {
          document.querySelector(`.card.${sec}`).classList.remove('not-started');
        });
        startGlobalTimer();
        setButtonState('limpiar');
        saveSession();
      } else {
        // ── Limpiar: clear everything ──
        if (confirm('¿Limpiar y reiniciar?')) {
          getCheckboxes().forEach(cb => { cb.checked = false; });
          getNutrientInputs().forEach(inp => { inp.value = ''; });
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(NUTRIENT_KEY);
          localStorage.removeItem(SESSION_KEY);
          SECTIONS.forEach(sec => {
            delete sectionStartTime[sec];
            delete sectionEndTime[sec];
            document.getElementById(`timer-${sec}`).textContent = '--:--';
            const card = document.querySelector(`.card.${sec}`);
            card.classList.remove('completed');
            card.classList.add('not-started');
          });
          resetGlobalTimer();
          isStarted = false;
          setButtonState('iniciar');
          updateAll();
        }
      }
    });

    // Persist elapsed time on page unload for accuracy
    window.addEventListener('beforeunload', saveSession);

    // ── Init ──────────────────────────────────────────────────────────────────
    async function initApp() {
      try {
        const sections = await loadChecklistConfig();
        renderChecklist(sections);
        bindInputEvents();
        loadState();

        const rawSession = localStorage.getItem(SESSION_KEY);
        if (rawSession) {
          const session  = JSON.parse(rawSession);
          timerElapsed   = session.elapsed || 0;
          isStarted      = true;
          document.getElementById('timerTotal').textContent = formatTime(timerElapsed);
          setButtonState('limpiar');
          updateAll();
        } else {
          SECTIONS.forEach(sec => {
            document.querySelector(`.card.${sec}`).classList.add('not-started');
          });
          setButtonState('iniciar');
          updateAll();
        }
      } catch (error) {
        setButtonState('iniciar');
        renderConfigError(error);
      }
    }

    initApp();
  </script>
</body>
</html>
